baseURL: https://vulfid.github.io/jamisontech-blog/
languageCode: en-us
title: Jamison Tech
theme: PaperMod

paginate: 10

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Jamison Tech
  description: "Firmware engineering, embedded C++, and 802.11 wireless — by Hunter R. Jamison"
  author: Hunter R. Jamison

  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Hunter R. Jamison"
    Content: >
      Firmware & wireless engineer. CWNE #551. Building embedded systems in C++
      and writing about 802.11, channel analysis, and the firmware that drives it all.

  socialIcons:
    - name: github
      url: "https://github.com/Vulfid"
    - name: linkedin
      url: "https://www.linkedin.com/in/hunterrjamison/"
    - name: email
      url: "mailto:hunterrjamison@gmail.com"

  cover:
    hiddenInList: false
    hiddenInSingle: true

  assets:
    disableFingerprinting: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: about
      name: About
      url: /about/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: monokai
